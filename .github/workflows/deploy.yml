name: Deploy

# Runs on a SELF-HOSTED runner that lives on the same box as the bot's Docker container,
# so deployment is all-local: build the image, swap the container, health-check. No SSH,
# no GitHub secrets — the bot's token stays in poe2bot.env on the box and is never in CI.
#
# SECURITY: triggers are push-to-main and manual dispatch ONLY — never pull_request — so a
# fork PR cannot execute code on the self-hosted runner. Keep it that way on a public repo.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys overlap (they fight over the `poe2bot` container name).
concurrency:
  group: deploy-poe2bot
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t poe2bot .

      - name: Redeploy container
        run: |
          set -euo pipefail
          # Path to the env file holding DISCORD_TOKEN etc. (lives on the box, git-ignored).
          # Override via repo variable POE2BOT_ENV_FILE if your runner user's HOME differs.
          ENV_FILE="${{ vars.POE2BOT_ENV_FILE }}"
          ENV_FILE="${ENV_FILE:-$HOME/PoE2-Trade-Bot/poe2bot.env}"
          test -f "$ENV_FILE" || { echo "::error::env file not found at $ENV_FILE (set repo variable POE2BOT_ENV_FILE)"; exit 1; }
          docker volume create poe2bot-data >/dev/null
          docker rm -f poe2bot >/dev/null 2>&1 || true
          docker run -d --name poe2bot \
            --env-file "$ENV_FILE" \
            -e DB_PATH=/data/poe2bot.db \
            -v poe2bot-data:/data \
            --restart unless-stopped \
            poe2bot

      - name: Health check
        run: |
          set -euo pipefail
          sleep 10
          status=$(docker inspect --type container -f '{{.State.Status}}' poe2bot)
          restarts=$(docker inspect --type container -f '{{.RestartCount}}' poe2bot)
          echo "container status=$status restarts=$restarts"
          docker logs --since 30s poe2bot 2>&1 | tail -20 || true
          if [ "$status" != "running" ]; then
            echo "::error::poe2bot is not running after deploy (status=$status)"; exit 1
          fi
